<div class="container mt-4">
  <h2 class="mb-4 text-center">Product List</h2>
  <div class="row g-4">
    <div class="col-md-4 col-sm-6" *ngFor="let product of products">
      <div class="card h-100 shadow-sm">
        <img [src]="product.image" class="card-img-top" [alt]="product.name" />
        <div class="card-body d-flex flex-column">
          <h5 class="card-title">{{ product.name }}</h5>
          <p class="card-text flex-grow-1">{{ product.description }}</p>
          <p class="card-text fw-bold text-primary">Price: ₹{{ product.price | number }}</p>
          <button class="btn btn-success mt-auto" (click)="addToCart(product)">
            Add to Cart
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
