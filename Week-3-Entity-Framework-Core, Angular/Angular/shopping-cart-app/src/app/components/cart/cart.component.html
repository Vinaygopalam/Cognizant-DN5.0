<div class="container mt-4" *ngIf="cartItems.length > 0; else emptyCart">
  <h2 class="mb-4 text-center">Shopping Cart</h2>
  <div class="table-responsive">
    <table class="table table-bordered table-hover align-middle">
      <thead class="table-dark">
        <tr>
          <th>Product Name</th>
          <th>Price</th>
          <th>Quantity</th>
          <th>Total Price</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of cartItems">
          <td>{{ item.product.name }}</td>
          <td>₹{{ item.product.price | number }}</td>
          <td>
            <button class="btn btn-sm btn-outline-secondary me-2" (click)="decreaseQuantity(item.product.id)">-</button>
            {{ item.quantity }}
            <button class="btn btn-sm btn-outline-secondary ms-2" (click)="increaseQuantity(item.product.id)">+</button>
          </td>
          <td>₹{{ item.product.price * item.quantity | number }}</td>
          <td>
            <button class="btn btn-sm btn-danger" (click)="removeItem(item.product.id)">Remove</button>
          </td>
        </tr>
      </tbody>
      <tfoot>
        <tr class="table-active">
          <td colspan="3" class="text-end fw-bold">Grand Total:</td>
          <td colspan="2" class="fw-bold text-primary">₹{{ grandTotal | number }}</td>
        </tr>
      </tfoot>
    </table>
  </div>
</div>

<ng-template #emptyCart>
  <div class="container mt-5 text-center">
    <div class="alert alert-info" role="alert">
      <h4 class="alert-heading">Your cart is empty!</h4>
      <p>Add some products to see them here.</p>
    </div>
  </div>
</ng-template>
